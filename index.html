<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}


html{
scroll-behavior:smooth;
}


body{

background:linear-gradient(
180deg,
#ffffff,
#eaffef
);

color:#222;

overflow-x:hidden;

}


:root{

--verde:#1fa64a;
--verdeoscuro:#117a34;
--rojo:#ff3030;

}



/* ===== CARGANDO ===== */


#loader{

position:fixed;

width:100%;
height:100%;

background:white;

display:flex;

align-items:center;

justify-content:center;

z-index:9999;

}


.loader-box{

text-align:center;

}


.esponja{

font-size:100px;

animation:lavar 2s infinite;

}


@keyframes lavar{

0%{
transform:translateX(-60px) rotate(-20deg);
}

50%{
transform:translateX(60px) rotate(20deg);
}

100%{
transform:translateX(-60px) rotate(-20deg);
}

}



.loader-box h2{

color:var(--verde);

font-size:35px;

margin-top:20px;

}


.loader-box span:after{

content:"";

animation:puntos 1.5s infinite;

}


@keyframes puntos{

0%{content:"";}

33%{content:".";}


66%{content:"..";}


100%{content:"...";}

}




/* ===== SIN INTERNET ===== */


#offline{

display:none;

position:fixed;

width:100%;
height:100%;

background:white;

z-index:9998;

align-items:center;

justify-content:center;

}



.offline-box{

text-align:center;

}



.escoba{

font-size:100px;

animation:barrer 2s infinite alternate;

}


@keyframes barrer{

from{
transform:translateX(-80px);
}

to{
transform:translateX(80px);
}

}



.offline-box h2{

color:var(--verde);

font-size:35px;

}




/* ===== BURBUJAS ===== */


.burbujas{

position:fixed;

width:100%;
height:100%;

z-index:-1;

}


.burbujas span{

position:absolute;

bottom:-100px;

width:35px;

height:35px;

background:#1fa64a40;

border-radius:50%;

animation:subir 15s infinite;

}



.burbujas span:nth-child(1){

left:10%;

}


.burbujas span:nth-child(2){

left:35%;

animation-duration:20s;

}



.burbujas span:nth-child(3){

left:60%;

width:50px;

height:50px;

animation-duration:25s;

}



.burbujas span:nth-child(4){

left:80%;

}



.burbujas span:nth-child(5){

left:90%;

}




@keyframes subir{

to{

transform:translateY(-120vh);

opacity:0;

}

}






/* ===== HEADER ===== */


header{

position:fixed;

top:0;

width:100%;

padding:20px 8%;

background:#ffffffdd;

backdrop-filter:blur(10px);

z-index:1000;

box-shadow:0 5px 20px #0002;

}



nav{

display:flex;

justify-content:space-between;

align-items:center;

}



.logo{

font-size:30px;

font-weight:bold;

color:var(--verde);

}



nav ul{

display:flex;

gap:25px;

list-style:none;

}


nav a{

text-decoration:none;

color:#333;

font-weight:bold;

}


nav a:hover{

color:var(--verde);

}



/* ===== INICIO ===== */

padding:150px 8% 50px;

display:flex;

align-items:center;

justify-content:space-between;

.inicio h1{

margin-top:30px;

/* ===== PORQUE ELEGIRNOS ===== */

padding:100px 8%;

}


.titulo{

font-size:45px;

color:var(--verde);

margin-bottom:50px;

}



.beneficios{

display:grid;

gap:30px;

.beneficio{

background:white;

text-align:center;

box-shadow:0 15px 35px #0002;

.beneficio:hover{

.beneficio h3{

.beneficio p{

/* ===== PRODUCTOS ===== */


.productos{

padding:100px 8%;

background:#f3fff7;

}



.categorias{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:15px;

margin-bottom:50px;

}



.categoria{

border:none;

padding:15px 30px;

border-radius:50px;

background:white;

cursor:pointer;

font-size:17px;

font-weight:bold;

box-shadow:0 10px 25px #0002;

transition:.3s;

}



.categoria:hover,

.lista-productos{

.producto{

background:white;

border-radius:25px;

overflow:hidden;

box-shadow:0 15px 35px #0002;

transition:.4s;

padding-bottom:25px;

}



.producto:hover{

}



.producto img{

width:100%;

height:250px;

object-fit:contain;

background:#eaffef;

}



.producto h3{

text-align:center;

color:var(--verde);

font-size:24px;

padding:20px;

}



.producto p{

text-align:center;

}



.consultar{

display:block;

width:80%;

margin:auto;

background:var(--rojo);

color:white;

text-decoration:none;

text-align:center;

padding:15px;

border-radius:50px;

font-weight:bold;

transition:.3s;

}



.consultar:hover{

transform:scale(1.05);

}





/* ===== OPINIONES ===== */


.opiniones{

padding:100px 8%;

}



.tarjetas-opinion{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:30px;

}



.opinion{

background:white;

padding:30px;

border-radius:25px;

text-align:center;

box-shadow:0 15px 30px #0002;

}



.estrellas{

font-size:30px;

color:#ffc400;

}



.opinion p{

color:#666;

margin:20px;

}




/* ===== ENVIO ===== */


.envios{

padding:80px 8%;

}



.envio-box{

background:var(--verde);

color:white;

border-radius:30px;

padding:50px;

text-align:center;

}



.camion{

font-size:70px;

animation:mover 2s infinite alternate;

}


@keyframes mover{

from{

transform:translateX(-20px);

}

to{

transform:translateX(20px);

}

}
